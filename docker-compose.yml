services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: recipes-api:latest
    restart: unless-stopped
    # Server-managed production environment (APP_KEY, RECIPE_API_KEY, mail, etc.).
    # This file lives on the VPS only and is git-ignored — see .env.example.
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      # SQLite persisted on the db-data volume, kept out of /app so image
      # rebuilds never clobber it and new migrations always ship.
      DB_CONNECTION: sqlite
      DB_DATABASE: /data/database.sqlite
    ports:
      # Caddy terminates TLS itself (Let's Encrypt via sslip.io). Port 80 must
      # stay open for the ACME HTTP-01 challenge + HTTP->HTTPS redirect; 443
      # serves the API. No external reverse proxy.
      - "80:80"
      - "443:443"
    volumes:
      # /data is persistent: holds both the SQLite DB and Caddy's Let's Encrypt
      # certificates (FrankenPHP stores them under /data/caddy), so redeploys
      # never re-request certs and hit rate limits.
      - db-data:/data
      - storage-data:/app/storage
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:80/up"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

volumes:
  db-data:
  storage-data:
