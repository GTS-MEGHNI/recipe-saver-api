name: deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Prevent overlapping deploys stepping on each other.
concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH (build on VPS)
        uses: appleboy/ssh-action@2ead351e2f19b8b7f22b5c9c48b6dbb9b13c76a2 # v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          command_timeout: 20m
          script: |
            set -e
            cd "${{ secrets.VPS_PROJECT_PATH }}"

            echo "==> Pulling latest source"
            git fetch --all --prune
            git reset --hard origin/main

            echo "==> Building and starting containers"
            docker compose up -d --build --remove-orphans

            echo "==> Waiting for the container to report healthy"
            for i in $(seq 1 30); do
              status=$(docker compose ps --format '{{.Health}}' api 2>/dev/null || echo "")
              echo "health: ${status:-unknown} (attempt $i)"
              case "$status" in
                healthy) echo "==> Deploy healthy"; break ;;
                unhealthy) echo "::error::Container reported unhealthy"; docker compose logs --tail=50 api; exit 1 ;;
              esac
              if [ "$i" -eq 30 ]; then
                echo "::error::Timed out waiting for healthy container"
                docker compose logs --tail=50 api
                exit 1
              fi
              sleep 5
            done

            echo "==> Pruning old images"
            docker image prune -f
